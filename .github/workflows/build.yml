name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.1.0'

      - name: Build
        shell: bash
        run: |
          set +e
          gradle build --stacktrace 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: error

      - name: Upload JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cgn-selection-view
          path: build/libs/*.jar
          if-no-files-found: error
